<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout • São Jorge Para Todos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        :root { --primary:#6D28D9; --primary2:#8B5CF6; --green:#16A34A; --bg:#f3f5fb; --card:#ffffff; --border:#E5E7EB; --text:#111827; --muted:#6B7280; }
        body { background:var(--bg); color:var(--text); padding:40px 20px; }
        .container { max-width:1250px; margin:auto; }
        .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:35px; }
        .logo { display:flex; align-items:center; gap:16px; }
        .logo-img { width: 58px; height: 58px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
        .logo h1 { font-size:22px; font-weight:800; }
        .logo p { font-size:14px; color:var(--muted); margin-top:4px; }
        .secure { padding:14px 22px; background:#ECFDF5; border-radius:100px; display:flex; align-items:center; gap:10px; font-weight:700; color:var(--green); }
        .progress { display:flex; gap:12px; margin-bottom:30px; }
        .step { flex:1; height:10px; background:#DDD; border-radius:30px; overflow:hidden; }
        .step span { display:block; height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); }
        .checkout { display:grid; grid-template-columns:2fr 420px; gap:28px; align-items:flex-start; }
        .card { background:var(--card); border-radius:22px; padding:34px; border:1px solid var(--border); box-shadow:0 15px 35px rgba(15,23,42,.05); }
        .section { margin-bottom:40px; }
        .section-title { display:flex; align-items:center; gap:12px; margin-bottom:24px; font-size:20px; font-weight:800; }
        .section-title i { width:42px; height:42px; display:flex; justify-content:center; align-items:center; border-radius:12px; background:#F5F3FF; color:var(--primary); }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
        .form-group { margin-bottom:18px; }
        label { display:block; margin-bottom:8px; font-size:13px; font-weight:700; letter-spacing:.4px; color:var(--muted); text-transform:uppercase; }
        input { width:100%; height:58px; border:1px solid var(--border); border-radius:14px; padding:0 18px; font-size:16px; background:white; transition:.25s; }
        input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 4px rgba(109,40,217,.15); }
        .size-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
        .size { height:58px; display:flex; justify-content:center; align-items:center; border:2px solid var(--border); border-radius:14px; font-weight:800; cursor:pointer; transition:.25s; }
        .size:hover { border-color:var(--primary); background:#F5F3FF; }
        .size input { display:none; }
        .summary { position:sticky; top:30px; }
        .summary-shirt { width: 50%; margin-bottom: 20px; margin-left: auto; margin-right: auto; text-align: center; }
        .summary-shirt img { max-width: 100%; height: auto; border-radius: 16px; }
        .summary-box { padding:18px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
        .price { font-size:34px; font-weight:800; color:var(--primary); margin:24px 0; }
        .btn { width:100%; height:62px; border:none; border-radius:16px; background:linear-gradient(135deg,var(--primary),var(--primary2)); color:white; font-size:18px; font-weight:800; cursor:pointer; transition:.3s; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 18px 35px rgba(109,40,217,.35); }
        .info { margin-top:22px; display:flex; flex-direction:column; gap:12px; font-size:15px; color:var(--muted); }
        @media(max-width:980px){ .checkout { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <div class="logo">
            <img src="https://github.com/isaacrotandarodossantos-a11y/initial/blob/main/LOGO1.png?raw=true" alt="Logo" class="logo-img">
            <div><h1>São Jorge Para Todos</h1><p>Checkout Oficial da Inscrição</p></div>
        </div>
        <div class="secure"><i class="fa-solid fa-lock"></i> Pagamento Seguro</div>
    </div>
    
    <form id="checkoutForm">
        <div class="checkout">
            <div class="card">
                <div class="section">
                    <div class="section-title"><i class="fa-solid fa-user"></i> Dados do Atleta</div>
                    <div class="grid-2">
                        <div class="form-group"><label>Nome Completo</label><input type="text" name="nome" required></div>
                        <div class="form-group"><label>CPF</label><input type="text" name="cpf" placeholder="000.000.000-00" required></div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-title"><i class="fa-solid fa-shirt"></i> Tamanho da Camiseta</div>
                    <div class="size-grid">
                        <label class="size"><input type="radio" name="tamanho" value="P" required>P</label>
                        <label class="size"><input type="radio" name="tamanho" value="M">M</label>
                        <label class="size"><input type="radio" name="tamanho" value="G">G</label>
                        <label class="size"><input type="radio" name="tamanho" value="GG">GG</label>
                    </div>
                </div>
            </div>
            
            <div class="card summary">
                <div class="summary-shirt"><img src="https://github.com/isaacrotandarodossantos-a11y/initial/blob/main/2.png?raw=true" alt="Camiseta"></div>
                <h2>Resumo do Pedido</h2>
                <div class="summary-box"><span>Inscrição</span><strong>R$ 50,00</strong></div>
                <div class="price">R$ 50,00</div>
                <button type="submit" class="btn" id="btnFinalizar">FINALIZAR INSCRIÇÃO</button>
            </div>
        </div>
    </form>
</div>

<script>
    const form = document.getElementById("checkoutForm");
    const btn = document.getElementById("btnFinalizar");

    // Máscaras de CPF e Telefone
    function aplicarMascara(e) {
        let valor = e.target.value.replace(/\D/g, "");
        if (e.target.name === "cpf") {
            valor = valor.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        }
        e.target.value = valor.substring(0, 14);
    }
    document.querySelector('input[name="cpf"]').addEventListener("input", aplicarMascara);

    // Redirecionamento Direto
    form.addEventListener("submit", function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> REDIRECIONANDO...';
        
        window.location.href = "https://sandbox.mercadopago.com.br/checkout/v1/redirect?preference-id=722783171-2b5a8e56-5cbb-4a1e-838f-d548007b66e9&router-request-id=69707a4b-928e-45e9-b267-e47cd1104a06";
    });
</script>
</body>
</html>
