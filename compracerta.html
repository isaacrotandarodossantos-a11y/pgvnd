<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Confirmada</title>
    <!-- SDK do EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        // Inicializa o EmailJS
        (function(){ emailjs.init("n22ek6z0laD_OriXn"); })();

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const nome = urlParams.get('nome') || 'Atleta';
            const email = urlParams.get('email');

            // Envio automático do e-mail com o seu Template ID
            if(email) {
                emailjs.send("service_0fps9vq", "template_d069znx", {
                    to_email: email,
                    nome_cliente: nome
                }).then(() => {
                    console.log('E-mail enviado com sucesso!');
                }, (err) => {
                    console.log('Erro no envio:', err);
                });
            }
        };
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .btn { 
            background-color: #25d366; color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 5px; font-weight: bold; 
            font-size: 18px; display: inline-block; margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Compra concluída com sucesso!</h1>
    <p>Sua inscrição foi confirmada. Clique abaixo para entrar no nosso grupo oficial:</p>
    
    <a href="https://api.whatsapp.com/send/?phone=5582991382121&text&type=phone_number&app_absent=0" class="btn">ENTRAR NO GRUPO DO WHATSAPP</a>
    
    <br><br>
    <a href="/">Voltar ao início</a>
</body>
</html>
